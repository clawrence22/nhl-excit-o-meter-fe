<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHL Excite-o-Meter</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">NHL Excite-o-Meter</h1>
            <p class="subtitle">Real-time game excitement analytics</p>
        </header>

        <div class="input-section">
            <input type="date" id="gameDate" class="game-input">
            <button id="loadGamesBtn" class="analyze-btn">LOAD GAMES</button>
        </div>

        <div id="gamesList" class="games-list hidden"></div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Analyzing game excitement...</p>
        </div>

        <div id="results" class="results hidden">
            <div class="excitement-card">
                <div class="game-excitement" id="gameExcitement"></div>
            </div>
        </div>

        <div id="error" class="error hidden">
            <p id="errorMessage">Something went wrong. Please try again.</p>
        </div>
        
        <div class="methodology-link">
            <a href="about.html">About</a> | 
            <a href="methodology.html">How is excitement calculated?</a> | 
            <a href="stats-guide.html">Stats Guide</a> | 
            <a href="acknowledgments.html">Acknowledgments</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="games.js"></script>
    <script src="https://cdn.anychart.com/releases/v8/js/anychart-base.min.js"></script>
    <script src="https://cdn.anychart.com/releases/8.14.1/js/anychart-core.min.js"></script>
    <script src="https://cdn.anychart.com/releases/8.14.1/js/anychart-linear-gauge.min.js"></script>
</body>
</html>
