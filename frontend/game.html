<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHL Excite‑o‑Meter - Game Details</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header" onclick="window.location.href='index.html'" style="cursor: pointer;">
            <h1 class="title">NHL Excite‑o‑Meter</h1>
            <p class="subtitle">Game Analysis</p>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Analyzing game excitement...</p>
        </div>

        <div id="error" class="error hidden">
            <h3>Error</h3>
            <p id="errorMessage"></p>
        </div>

        <div id="results" class="hidden">
            <div class="game-header">
                <div class="team-matchup">
                    <div class="away-team">
                        <div class="team-info">
                            <img id="awayLogo" src="" alt="" class="team-logo-large">
                            <div class="team-name" id="awayTeamName">Away Team</div>
                            <!-- <div class="team-score" id="awayTeamScore">0</div> -->
                            <div class="game-excitement" id="awayExcitement"></div>
                        </div>
                    </div>
                    <div class="game-status">
                        <div class="period-time">
                            <div class="period-status" id="periodStatus">-</div>
                            <div class="time-status" id="timeStatus">-</div>
                        </div>
                        <div class="game-excitement" id="gameExcitement"></div>
                        <div class="excitement-summary" id="excitement-summary"></div>
                    </div>
                    <div class="home-team">
                        <div class="team-info">
                            <img id="homeLogo" src="" alt="" class="team-logo-large">
                            <div class="team-name" id="homeTeamName">Home Team</div>
                            <!-- <div class="team-score" id="homeTeamScore">0</div> -->
                            <div class="game-excitement" id="homeExcitement"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="stats-section">
                <h3 id="statsTitle">Game Statistics</h3>
                <div class="stats-table">
                    <div class="stats-header">
                        <div class="stat-category"></div>
                        <div class="away-header" id="awayStatsHeader">Away</div>
                        <div class="home-header" id="homeStatsHeader">Home</div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-category">Goals</div>
                        <div class="away-stat" id="awayGoals">0</div>
                        <div class="home-stat" id="homeGoals">0</div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-category">High Danger Chances <span class="info-icon" onclick="showHdcTooltip()">?</span></div>
                        <div class="away-stat" id="awayHdc">0</div>
                        <div class="home-stat" id="homeHdc">0</div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-category">Medium Danger Chances <span class="info-icon" onclick="showMdcTooltip()">?</span></div>
                        <div class="away-stat" id="awayMdc">0</div>
                        <div class="home-stat" id="homeMdc">0</div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-category">Hits <span class="info-icon" onclick="showHitsTooltip()">?</span></div>
                        <div class="away-stat" id="awayHits">0</div>
                        <div class="home-stat" id="homeHits">0</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="methodology-link">
            <a href="about.html">About</a> | 
            <a href="methodology.html">How is excitement calculated?</a> | 
            <a href="stats-guide.html">Stats Guide</a> | 
            <a href="acknowledgments.html">Acknowledgments</a>
        </div>
        
        <div class="debug-info">
            Game ID: <span id="debugGameId"></span>
        </div>
    </div>

    <div id="contextModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeContextModal()">&times;</span>
            <div id="contextModalContent"></div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="config.js"></script>
    <script src="game.js"></script>
    <script src="https://cdn.anychart.com/releases/v8/js/anychart-base.min.js"></script>
    <script src="https://cdn.anychart.com/releases/8.14.1/js/anychart-core.min.js"></script>
    <script src="https://cdn.anychart.com/releases/8.14.1/js/anychart-linear-gauge.min.js"></script>
</body>
</html>
