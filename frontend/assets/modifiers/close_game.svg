<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Face Circle -->
  <circle cx="50" cy="50" r="45" fill="#FFCC4D" />
  
  <!-- Wider Eyes (White background with pupils) -->
  <circle cx="33" cy="42" r="8" fill="white" />
  <circle cx="33" cy="42" r="4" fill="#664500" />
  
  <circle cx="67" cy="42" r="8" fill="white" />
  <circle cx="67" cy="42" r="4" fill="#664500" />
  
  <!-- Worried Eyebrows (More angled) -->
  <path d="M25 32 Q35 22 45 32" stroke="#664500" stroke-width="3" fill="none" stroke-linecap="round" />
  <path d="M55 32 Q65 22 75 32" stroke="#664500" stroke-width="3" fill="none" stroke-linecap="round" />
  
  <!-- "Grimace" Style Smile (Tight and wavy) -->
  <rect x="30" y="65" width="40" height="12" rx="6" fill="white" stroke="#664500" stroke-width="2" />
  <path d="M30 71 H70 M40 65 V77 M50 65 V77 M60 65 V77" stroke="#664500" stroke-width="1" />
  
  <!-- Anxiety Sweat Drop -->
  <path d="M78 28 Q83 18 88 28 T78 28" fill="#5DADEC" />
